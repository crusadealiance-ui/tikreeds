<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader Fix</title>
    <style>
        body { font-family: sans-serif; background: #111827; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1f2937; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #374151; background: #111827; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #374151; opacity: 0.6; }
        #status { margin-top: 15px; color: #fbbf24; display: none; }
        #hasil { display: none; margin-top: 20px; }
        .btn-dl { display: block; background: #10b981; color: white; padding: 10px; text-decoration: none; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Video Downloader</h2>
    <input type="text" id="linkVideo" placeholder="Tempel link video di sini...">
    <button id="btnProses" onclick="ambilVideo()">PROSES VIDEO</button>

    <div id="status">Sedang memproses...</div>

    <div id="hasil">
        <span>✅ Berhasil!</span>
        <a id="linkDownload" href="#" target="_blank" class="btn-dl">DOWNLOAD SEKARANG</a>
    </div>
</div>

<script>
async function ambilVideo() {
    // 1. Ambil elemen
    const input = document.getElementById('linkVideo');
    const btn = document.getElementById('btnProses');
    const status = document.getElementById('status');
    const hasil = document.getElementById('hasil');
    const linkDownload = document.getElementById('linkDownload');

    // 2. Validasi
    if (!input.value) {
        alert("Masukkan link video dulu!");
        return;
    }

    // 3. UI Loading
    btn.disabled = true;
    btn.innerText = "SABAR...";
    status.style.display = "block";
    hasil.style.display = "none";

    try {
        // 4. Tembak API Cobalt
        const response = await fetch("https://api.cobalt.tools/api/json", {
            method: "POST",
            headers: {
                "Accept": "application/json",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                url: input.value,
                vQuality: "720"
            })
        });

        const data = await response.json();

        // 5. Cek Hasil
        if (data.url) {
            linkDownload.href = data.url;
            hasil.style.display = "block";
            status.style.display = "none";
        } else {
            alert("Gagal: Link tidak didukung atau server sibuk.");
        }

    } catch (error) {
        alert("Terjadi kesalahan koneksi ke server API.");
        console.error(error);
    } finally {
        // 6. Kembalikan tombol
        btn.disabled = false;
        btn.innerText = "PROSES VIDEO";
        status.style.display = "none";
    }
}
</script>

</body>
</html>
