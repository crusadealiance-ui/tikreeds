<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Anti-Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h2 { margin-bottom: 10px; font-size: 1.5rem; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus { border-color: var(--primary); }
        button {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #4f46e5; }
        button:disabled { background: #475569; cursor: not-allowed; }
        #result {
            margin-top: 20px;
            display: none;
            padding: 15px;
            background: #334155;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .download-btn {
            display: block;
            margin-top: 10px;
            background: #10b981;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
        }
        #status { margin-top: 15px; font-size: 0.85rem; color: #fbbf24; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎬 Downloader Pro</h2>
    <p>TikTok • Instagram • Facebook</p>
    
    <input type="text" id="urlInput" placeholder="Tempel link video di sini...">
    <button id="btnGas" onclick="ambilVideo()">Mulai Proses</button>

    <div id="status">⏳ Sedang menembus blokir...</div>

    <div id="result">
        <span style="display:block; margin-bottom:10px;">✅ Video Siap!</span>
        <a id="linkFinal" href="#" target="_blank" class="download-btn">KLIK UNTUK SIMPAN</a>
        <small style="display:block; margin-top:10px; color:#94a3b8; font-size:11px;">
            *Jika video malah terputar, klik titik tiga (⋮) lalu pilih Download.
        </small>
    </div>
</div>

<script>
async function ambilVideo() {
    const url = document.getElementById('urlInput').value;
    const btn = document.getElementById('btnGas');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const linkFinal = document.getElementById('linkFinal');

    if (!url) return alert("Masukkan link dulu!");

    // UI Start
    btn.disabled = true;
    btn.innerText = "Memproses...";
    status.style.display = "block";
    result.style.display = "none";

    // Gunakan Proxy AllOrigins untuk menembus CORS Error
    const proxy = "https://api.allorigins.win/raw?url=";
    const targetApi = "https://api.cobalt.tools/api/json";

    try {
        const response = await fetch(targetApi, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify({
                url: url,
                videoQuality: "720"
            })
        });

        const data = await response.json();

        if (data.url) {
            linkFinal.href = data.url;
            result.style.display = "block";
            status.style.display = "none";
        } else {
            alert("Gagal mengambil link. Pastikan link video benar atau coba lagi nanti.");
        }
    } catch (error) {
        console.error(error);
        alert("Terjadi gangguan koneksi ke server. Coba gunakan browser lain atau matikan VPN jika ada.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Mulai Proses";
        status.style.display = "none";
    }
}
</script>

</body>
</html>
