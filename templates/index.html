<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }

        .card {
            background: var(--glass);
            padding: 32px;
            border-radius: 24px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        h2 { margin-bottom: 8px; font-weight: 600; font-size: 1.5rem; }
        
        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #loading {
            display: none;
            margin-top: 16px;
            font-size: 0.9rem;
            color: #6366f1;
            font-weight: 600;
        }

        #result {
            display: none;
            margin-top: 24px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .thumb-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        img {
            width: 100%;
            display: block;
        }

        .btn-download {
            background: #10b981; /* Hijau agar kontras */
        }

        .btn-download:hover { background: #059669; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎬 Video Downloader</h2>
    <p class="subtitle">Download dari TikTok, IG, & FB</p>

    <div class="input-group">
        <input type="text" id="url" placeholder="Tempel tautan video di sini...">
    </div>
    
    <button onclick="getVideo()" id="mainBtn">Ambil Video</button>

    <div id="loading">✨ Sedang memproses...</div>

    <div id="result">
        <div class="thumb-container">
            <img id="thumb" alt="Thumbnail">
        </div>
        <a id="downloadBtn" style="text-decoration: none;">
            <button class="btn-download">Simpan Video Sekarang</button>
        </a>
    </div>
</div>

<script>
function getVideo() {
    const urlInput = document.getElementById("url");
    const mainBtn = document.getElementById("mainBtn");
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    if (!urlInput.value) return alert("Masukkan URL terlebih dahulu!");

    // UI Feedback
    mainBtn.disabled = true;
    mainBtn.innerText = "Processing...";
    loading.style.display = "block";
    result.style.display = "none";

    fetch('/get-link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: "url=" + encodeURIComponent(urlInput.value)
    })
    .then(res => res.json())
    .then(data => {
        mainBtn.disabled = false;
        mainBtn.innerText = "Ambil Video";
        loading.style.display = "none";

        if (data.error) {
            alert("Error: " + data.error);
            return;
        }

        document.getElementById("thumb").src = data.thumbnail;
        document.getElementById("downloadBtn").href = "/download?url=" + encodeURIComponent(data.video);
        result.style.display = "block";
    })
    .catch(err => {
        mainBtn.disabled = false;
        mainBtn.innerText = "Ambil Video";
        loading.style.display = "none";
        alert("Terjadi kesalahan jaringan.");
    });
}
</script>

</body>
</html>
