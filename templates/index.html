<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Video Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
            --glass: rgba(255, 255, 255, 0.98);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }

        .card {
            background: var(--glass);
            padding: 32px;
            border-radius: 24px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h2 { margin-bottom: 8px; font-weight: 600; font-size: 1.6rem; color: #0f172a; }
        
        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .input-group { margin-bottom: 16px; }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover { background: var(--primary-hover); }
        button:active { transform: scale(0.98); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        #status {
            display: none;
            margin-top: 16px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .loader { color: var(--primary); }
        .error { color: #ef4444; }

        #result {
            display: none;
            margin-top: 24px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-download {
            background: #10b981;
            text-decoration: none;
            display: block;
            margin-top: 10px;
        }

        .btn-download:hover { background: #059669; }

        .info-box {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #475569;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h2>🚀 Downloader Pro</h2>
    <p class="subtitle">Tanpa Watermark • Tanpa 403 Error</p>

    <div class="input-group">
        <input type="text" id="urlInput" placeholder="Tempel link TikTok / IG / FB...">
    </div>
    
    <button onclick="downloadVideo()" id="mainBtn">Mulai Proses</button>

    <div id="status"></div>

    <div id="result">
        <div class="info-box">
            ✅ Video berhasil disiapkan!
        </div>
        <a id="downloadLink" href="#" target="_blank" style="text-decoration: none;">
            <button class="btn-download">Simpan Video ke Galeri</button>
        </a>
    </div>
</div>
