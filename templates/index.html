<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader Pro v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #6366f1;
            --success: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 { margin-bottom: 8px; font-weight: 700; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #4f46e5; transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; transform: none; }

        #loader {
            display: none;
            margin-top: 20px;
            color: var(--accent);
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        #result {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #334155;
            border-radius: 16px;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .download-link {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background: var(--success);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .download-link:hover { background: #059669; }

        .error-msg {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎬 Video Saver</h2>
    <p>Tempel link TikTok, IG, atau FB kamu</p>

    <div class="input-group">
        <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@...">
    </div>

    <button id="btnMain" onclick="mulaiDownload()">Ambil Video</button>

    <div id="loader">⚡ Sedang memproses...</div>
    <div id="error" class="error-msg">Terjadi kesalahan. Coba ganti link atau ulangi lagi.</div>

    <div id="result">
        <span style="font-weight: bold; display: block; margin-bottom: 10px;">Video Berhasil Diambil!</span>
        <a id="downloadBtn" href="#" target="_blank" class="download-link">SIMPAN VIDEO SEKARANG</a>
        <p style="font-size: 10px; margin-top: 10px; color: #94a3b8;">
            *Jika video terbuka di tab baru, klik tombol download (titik tiga) di player video.
        </p>
    </div>
</div>

<script>
async function mulaiDownload() {
    const input = document.getElementById('urlInput').value;
    const btn = document.getElementById('btnMain');
    const loader = document.getElementById('loader');
    const result = document.getElementById('result');
    const errorMsg = document.getElementById('error');
    const dlBtn = document.getElementById('downloadBtn');

    if (!input) {
        alert("Masukkan link video dulu ya!");
        return;
    }

    // UI Reset
    btn.disabled = true;
    loader.style.display = "block";
    result.style.display = "none";
    errorMsg.style.display = "none";

    try {
        // Menggunakan API Cobalt langsung
        const response = await fetch("https://api.cobalt.tools/api/json", {
            method: "POST",
            headers: {
                "Accept": "application/json",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                url: input,
                vQuality: "720",
                filenameStyle: "pretty"
            })
        });

        const data = await response.json();

        if (data.status === "error" || !data.url) {
            throw new Error("Gagal");
        }

        // Berhasil
        dlBtn.href = data.url;
        result.style.display = "block";
        loader.style.display = "none";

    } catch (err) {
        // Jika gagal, tampilkan pesan error
        loader.style.display = "none";
        errorMsg.style.display = "block";
        console.error(err);
    } finally {
        btn.disabled = false;
    }
}
</script>

</body>
</html>
